server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/api/v1/auth/**
          filters:
            - StripPrefix=0

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/v1/products/**,/api/v1/categories/**,/api/v1/stock/**
          filters:
            - StripPrefix=0

        - id: employee-service
          uri: lb://employee-service
          predicates:
            - Path=/api/v1/employees/**,/api/v1/departments/**,/api/v1/positions/**
          filters:
            - StripPrefix=0

        - id: delivery-service
          uri: lb://delivery-service
          predicates:
            - Path=/api/v1/deliveries/**,/api/v1/customers/**
          filters:
            - StripPrefix=0



eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true

jwt:
  secret: ${JWT_SECRET:change-me-in-production}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway

server:
  port: 8082
spring:
  application:
    name: product-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/furniture_db}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: inventory
        hbm2ddl:
          create_namespaces: true
eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka}
  instance:
    prefer-ip-address: true
jwt:
  secret: ${JWT_SECRET:change-me-in-production}
springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  packagesToScan: com.furniturestore.product
management:
  endpoints:
    web:
      exposure:
        include: health,info
